version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# EduStream — Local Development Stack
#
# Services:
#   postgres   - Primary database
#   redis      - BullMQ queue + caching
#   backend    - Node/Express API  (port 3000)
#   ai_service - FastAPI AI service (port 8000)
#
# Usage:
#   docker-compose up --build
#   docker-compose up postgres redis   # infrastructure only
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edustream_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edustream
      POSTGRES_USER: edustream
      POSTGRES_PASSWORD: edustream_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edustream -d edustream"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edustream_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: edustream_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: edustream
      DB_PASSWORD: edustream_dev
      DB_NAME: edustream
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai_service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── AI Microservice ─────────────────────────────────────────────────────────
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: edustream_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai_service/.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: edustream_network
